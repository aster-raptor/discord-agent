name: Release Rust Bot

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --bins --lib

      - name: Build release binaries
        run: cargo build --release --bin bot --bin agent-cli

      - name: Package release artifact
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE_BASENAME="discord-agent-bot-linux-x86_64-${VERSION}"
          PACKAGE_DIR="${RUNNER_TEMP}/${ARCHIVE_BASENAME}"

          mkdir -p "${PACKAGE_DIR}"
          cp target/release/bot "${PACKAGE_DIR}/bot"
          cp target/release/agent-cli "${PACKAGE_DIR}/agent-cli"
          cp README.md "${PACKAGE_DIR}/README.md"
          mkdir -p "${PACKAGE_DIR}/prompts"
          cp prompts/research.txt "${PACKAGE_DIR}/prompts/research.txt"

          tar -C "${RUNNER_TEMP}" -czf "${ARCHIVE_BASENAME}.tar.gz" "${ARCHIVE_BASENAME}"

      - name: Publish GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: discord-agent-bot-linux-x86_64-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
